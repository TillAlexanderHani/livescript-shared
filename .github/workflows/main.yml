name: Podcast Pipeline (Claude)

on:
  schedule:
    # Times are UTC. Europe/Paris = UTC+2 (summer) / UTC+1 (winter).
    - cron: '0 5 * * *'    # DIGEST  — ~07:00 Paris: send the daily brief
    - cron: '0 9 * * *'    # collect
    - cron: '0 13 * * *'   # collect
    - cron: '0 17 * * *'   # collect
    - cron: '0 21 * * *'   # collect
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        type: choice
        default: 'digest'
        options: [digest, collect, both]
      max_episodes:
        description: 'Max episodes this run (0 = unlimited). Use 2 for a quick smoke test.'
        type: string
        default: '0'

permissions:
  contents: write

concurrency:
  group: podcast-pipeline-singleton
  cancel-in-progress: false   # queue runs instead of cancelling

jobs:
  process-podcasts:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "0 5 * * *" ]; then
            MODE="digest"
          else
            MODE="collect"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE  (trigger: ${{ github.event_name }})"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude auth check
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "Token set: ${CLAUDE_CODE_OAUTH_TOKEN:+yes}${CLAUDE_CODE_OAUTH_TOKEN:-NO}"
          echo "Token prefix: ${CLAUDE_CODE_OAUTH_TOKEN:0:12}"
          claude --version || true
          echo "--- print test (stdout+stderr) ---"
          claude -p "Reply with exactly: PING_OK" --output-format text; echo "rc=$?"

      - name: Install system + Python deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg --no-install-recommends
          pip install --upgrade pip
          # CPU-only torch from the dedicated index (avoids huge CUDA wheels),
          # then let pip resolve a coherent openai-whisper stack.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install openai-whisper feedparser requests python-dateutil

      - name: Ensure state files exist
        run: |
          [ -f emailed_episodes.json ] || echo '{"version":"4.0","episodes":{}}' > emailed_episodes.json
          python -c "import json; json.load(open('emailed_episodes.json'))" \
            || echo '{"version":"4.0","episodes":{}}' > emailed_episodes.json
          [ -f pending_digest.json ] || echo '{"episodes":[],"last_digest_date":null}' > pending_digest.json
          python -c "import json; json.load(open('pending_digest.json'))" \
            || echo '{"episodes":[],"last_digest_date":null}' > pending_digest.json

      - name: Run pipeline
        env:
          RUN_MODE: ${{ steps.mode.outputs.mode }}
          MAX_EPISODES_PER_RUN: ${{ github.event.inputs.max_episodes || '0' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          mkdir -p downloads
          echo "Starting ($RUN_MODE) at $(date -u '+%F %H:%M UTC')"
          python podcast_pipeline.py
          echo "Done at $(date -u '+%F %H:%M UTC')"

      - name: Commit state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase || true
          CHANGED=0
          for f in emailed_episodes.json pending_digest.json; do
            if [ -f "$f" ] && python -c "import json; json.load(open('$f'))" 2>/dev/null; then
              if ! git diff --quiet "$f"; then
                git add "$f"; CHANGED=1
              fi
            fi
          done
          if [ "$CHANGED" = "1" ]; then
            git commit -m "Update state [$(date -u '+%F %H:%M UTC')] - ${{ steps.mode.outputs.mode }}"
            git push
            echo "State committed."
          else
            echo "No state changes to commit."
          fi

      - name: Cleanup
        if: always()
        run: rm -rf downloads *.tmp 2>/dev/null || true
